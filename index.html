<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HEX OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:       #00ffcc;
  --accent-dim:   rgba(0,255,204,0.12);
  --accent-border:rgba(0,255,204,0.32);
  --bg:           #07070f;
  --bg2:          #0d0d1a;
  --bg3:          #12121f;
  --text:         #e0e0f0;
  --dim:          #6e6e8a;
  --red:          #ff4d6d;
  --amber:        #ffb830;
  --green:        #00ffcc;
  --purple:       #a78bfa;
  --blue:         #38bdf8;
  --border:       rgba(255,255,255,0.07);
  --radius:       12px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(7,7,15,0.96);
  backdrop-filter: blur(14px);
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 4px;
  color: var(--accent);
  text-shadow: 0 0 18px rgba(0,255,204,0.5);
  flex-shrink: 0;
}

.header-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
}

.sync-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 1px;
}

.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
  transition: background 0.4s, box-shadow 0.4s;
  flex-shrink: 0;
}

.sync-dot.ok    { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
.sync-dot.err   { background: var(--red);    box-shadow: 0 0 6px var(--red); }
.sync-dot.pulse { animation: pulse 1.4s ease-in-out infinite; }

@keyframes pulse {
  0%,100% { opacity:1; } 50% { opacity:.35; }
}

#syncLabel { transition: color 0.3s; }
#syncLabel.ok  { color: var(--accent); }
#syncLabel.err { color: var(--red); }

.last-sync { font-size: 10px; color: var(--dim); }

.header-clock {
  flex-shrink: 0;
  text-align: right;
}

.clock {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: var(--dim);
  letter-spacing: 2px;
  line-height: 1;
}

.date-str { font-size: 9px; color: var(--dim); margin-top: 2px; }

/* ── MAIN GRID ── */
main {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 14px;
  padding: 18px 20px;
  max-width: 1600px;
  margin: 0 auto;
}

/* ── CARD ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  transition: opacity 0.35s;
}

.card:hover::before { opacity: 1; }

.card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  letter-spacing: 3px;
  color: var(--accent);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title .icon { opacity: 0.65; font-size: 13px; }

/* ── SOURCE BADGE ── */
.src-badge {
  font-size: 9px;
  letter-spacing: 1px;
  padding: 2px 7px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--dim);
  background: var(--bg3);
  margin-left: auto;
  flex-shrink: 0;
}

/* ── YEAR PROGRESS ── */
.year-card { grid-column: span 12; }

.year-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 8px;
}

.year-pct {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  color: var(--accent);
  text-shadow: 0 0 16px rgba(0,255,204,0.4);
  line-height: 1;
}

.year-label { font-size: 11px; color: var(--dim); }

.bar-track {
  width: 100%;
  height: 7px;
  background: var(--bg3);
  border-radius: 99px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.bar-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, #00b894, var(--accent));
  box-shadow: 0 0 10px rgba(0,255,204,0.4);
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
}

.year-stats {
  display: flex;
  gap: 20px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.year-stat { font-size: 10px; color: var(--dim); }
.year-stat span { color: var(--text); }

/* ── UPCOMING EVENTS (next 7 days strip) ── */
.upcoming-strip {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.upcoming-strip::-webkit-scrollbar { display: none; }

.upcoming-day {
  flex-shrink: 0;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  min-width: 110px;
  transition: border-color 0.2s;
}

.upcoming-day.today { border-color: var(--accent-border); background: var(--accent-dim); }
.upcoming-day.today .ud-label { color: var(--accent); }

.ud-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--dim);
  margin-bottom: 6px;
}

.ud-events { display: flex; flex-direction: column; gap: 4px; }

.ud-event {
  font-size: 10px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.ud-time { color: var(--accent); margin-right: 4px; }
.ud-none { font-size: 10px; color: var(--dim); font-style: italic; }

/* ── CALENDAR ── */
.calendar-card { grid-column: span 6; }

.cal-nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.cal-nav { display: flex; gap: 6px; align-items: center; }

.btn-icon {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  width: 26px; height: 26px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.btn-icon:hover { border-color: var(--accent); color: var(--accent); }

.cal-month-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 2px;
  min-width: 130px;
  text-align: center;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.cal-day-lbl {
  text-align: center;
  font-size: 9px;
  color: var(--dim);
  padding: 3px 0;
  letter-spacing: 1px;
}

.cal-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 5px;
  font-size: 11px;
  border: 1px solid transparent;
  position: relative;
  cursor: default;
  transition: background 0.1s;
}

.cal-day.today    { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 600; }
.cal-day.other-mo { color: var(--dim); opacity: 0.3; }
.cal-day.has-ev::after {
  content: '';
  width: 4px; height: 4px;
  background: var(--accent);
  border-radius: 50%;
  position: absolute;
  bottom: 2px;
}

.cal-events-list {
  margin-top: 12px;
  max-height: 160px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.cal-ev-item {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 11px;
}

.cal-ev-date { color: var(--accent); min-width: 55px; font-size: 10px; }
.cal-ev-time { color: var(--dim); font-size: 10px; min-width: 36px; }
.cal-ev-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cal-ev-cal  { font-size: 9px; color: var(--dim); flex-shrink: 0; }

/* ── TODOS ── */
.todo-card { grid-column: span 6; }

.todo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}

.filter-group { display: flex; gap: 4px; flex-wrap: wrap; }

.fbtn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 1px;
}
.fbtn.active, .fbtn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

.todo-list { display: flex; flex-direction: column; gap: 5px; max-height: 320px; overflow-y: auto; }

.todo-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  transition: border-color 0.18s;
}

.todo-item:hover { border-color: var(--accent-border); }
.todo-item.done  { opacity: 0.38; }
.todo-item.done .todo-txt { text-decoration: line-through; }

.todo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.todo-txt { flex: 1; font-size: 12px; word-break: break-word; line-height: 1.4; }

.pri-badge {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 99px;
  letter-spacing: 1px;
  font-weight: 500;
  flex-shrink: 0;
}

.pri-badge.high { background: rgba(255,77,109,0.15); color: var(--red);   border: 1px solid rgba(255,77,109,0.35); }
.pri-badge.mid  { background: rgba(255,184,48,0.15);  color: var(--amber); border: 1px solid rgba(255,184,48,0.35); }
.pri-badge.low  { background: rgba(0,255,204,0.08);   color: var(--accent);border: 1px solid var(--accent-border); }

.todo-list-badge {
  font-size: 9px;
  color: var(--dim);
  flex-shrink: 0;
}

/* ── SPENDING ── */
.spending-card { grid-column: span 6; }

.spend-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 8px;
}

.spend-month-nav { display: flex; align-items: center; gap: 6px; }

.spend-month-lbl {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  min-width: 110px;
  text-align: center;
}

.spend-total {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: var(--accent);
  line-height: 1;
}

.spend-cats { display: flex; flex-direction: column; gap: 9px; }

.spend-row { display: flex; flex-direction: column; gap: 3px; }

.spend-lbl-row { display: flex; justify-content: space-between; font-size: 10px; }
.spend-cat-name { color: var(--dim); letter-spacing: 1px; }
.spend-cat-amt  { color: var(--text); }

.bar-track-sm { height: 4px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
.bar-fill-sm  { height: 100%; border-radius: 99px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }

.spend-add-form {
  margin-top: 13px;
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
}

.spend-log {
  margin-top: 10px;
  max-height: 110px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.spend-entry {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 5px 9px;
  font-size: 10px;
}

/* ── SUBSCRIPTIONS ── */
.subs-card { grid-column: span 6; }

.subs-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
  max-height: 320px;
  overflow-y: auto;
}

.sub-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 13px;
  transition: border-color 0.18s;
}

.sub-item:hover { border-color: var(--accent-border); }

.sub-left { display: flex; flex-direction: column; gap: 3px; }
.sub-name { font-size: 13px; }
.sub-meta { font-size: 9px; color: var(--dim); }

.sub-right { display: flex; align-items: center; gap: 12px; }

.sub-days {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  line-height: 1;
  min-width: 36px;
  text-align: right;
}

.sub-days.red   { color: var(--red);   text-shadow: 0 0 8px rgba(255,77,109,0.35); }
.sub-days.amber { color: var(--amber); text-shadow: 0 0 8px rgba(255,184,48,0.35); }
.sub-days.green { color: var(--green); text-shadow: 0 0 8px rgba(0,255,204,0.25); }

.sub-days-lbl { font-size: 8px; color: var(--dim); text-align: right; line-height: 1.3; }
.sub-cost { font-size: 10px; color: var(--dim); }

/* ── WHATSAPP COMMANDS ── */
.wa-card { grid-column: span 12; }

.cmd-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 8px;
}

.cmd-item {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 11px 13px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  overflow: hidden;
}

.cmd-item:hover { border-color: var(--accent-border); background: var(--accent-dim); }

.cmd-item::after {
  content: 'COPIED';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0.8);
  background: var(--accent);
  color: var(--bg);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 3px;
  padding: 5px 14px;
  border-radius: 6px;
  opacity: 0;
  transition: all 0.18s;
  pointer-events: none;
}

.cmd-item.copied::after { opacity: 1; transform: translate(-50%,-50%) scale(1); }

.cmd-command { font-size: 12px; color: var(--accent); }
.cmd-desc    { font-size: 10px; color: var(--dim); }

/* ── SHARED INPUTS / BUTTONS ── */
input, select {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  border-radius: 6px;
  padding: 6px 9px;
  outline: none;
  transition: border-color 0.18s;
  min-width: 0;
}
input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0,255,204,0.08);
}
select option { background: var(--bg2); }

.btn {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 6px 13px;
  border-radius: 6px;
  border: 1px solid var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.18s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn:hover { background: var(--accent); color: var(--bg); }

.del-btn {
  background: transparent;
  border: none;
  color: var(--dim);
  cursor: pointer;
  font-size: 13px;
  padding: 2px 5px;
  border-radius: 4px;
  transition: all 0.18s;
  flex-shrink: 0;
}
.del-btn:hover { color: var(--red); background: rgba(255,77,109,0.1); }

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 22px;
  color: var(--dim);
  font-size: 11px;
  border: 1px dashed var(--border);
  border-radius: 8px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--accent-border); border-radius: 99px; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 22px; right: 22px;
  background: var(--bg2);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 9px 18px;
  border-radius: 8px;
  font-size: 11px;
  letter-spacing: 1px;
  transform: translateY(50px);
  opacity: 0;
  transition: all 0.28s;
  z-index: 999;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ── MOBILE NAV ── */
.nav-tabs {
  display: none;
  overflow-x: auto;
  padding: 0 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--dim);
  padding: 9px 14px;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  background: none;
  border-top: none; border-left: none; border-right: none;
}
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .calendar-card, .todo-card, .spending-card, .subs-card { grid-column: span 12; }
}

@media (max-width: 640px) {
  main { padding: 10px; gap: 10px; }
  header { padding: 8px 14px; }
  .logo { font-size: 20px; }
  .nav-tabs { display: flex; }
}
</style>
</head>
<body>

<header>
  <div class="logo">HEX OS</div>
  <div class="header-meta">
    <div class="sync-row">
      <span class="sync-dot pulse" id="syncDot"></span>
      <span id="syncLabel">CONNECTING…</span>
    </div>
    <div class="last-sync" id="lastSync">—</div>
  </div>
  <div class="header-clock">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date-str" id="dateStr">—</div>
  </div>
</header>

<nav class="nav-tabs">
  <button class="nav-tab active" onclick="scrollTo('year-section')">YEAR</button>
  <button class="nav-tab" onclick="scrollTo('cal-section')">CALENDAR</button>
  <button class="nav-tab" onclick="scrollTo('todo-section')">TODOS</button>
  <button class="nav-tab" onclick="scrollTo('spend-section')">SPENDING</button>
  <button class="nav-tab" onclick="scrollTo('subs-section')">SUBS</button>
  <button class="nav-tab" onclick="scrollTo('wa-section')">COMMANDS</button>
</nav>

<main>

  <!-- ── YEAR PROGRESS ── -->
  <div class="card year-card" id="year-section">
    <div class="card-title"><span class="icon">◈</span> YEAR PROGRESS — 2026</div>
    <div class="year-row">
      <div class="year-label" id="yearLabel">DAYS ELAPSED / REMAINING</div>
      <div class="year-pct" id="yearPct">0%</div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="yearBar" style="width:0%"></div></div>
    <div class="year-stats">
      <div class="year-stat">ELAPSED <span id="daysElapsed">—</span> DAYS</div>
      <div class="year-stat">REMAINING <span id="daysLeft">—</span> DAYS</div>
      <div class="year-stat">WEEK <span id="weekNum">—</span> OF 52</div>
      <div class="year-stat">QUARTER <span id="quarter">—</span></div>
    </div>
    <div class="upcoming-strip" id="upcomingStrip"></div>
  </div>

  <!-- ── CALENDAR ── -->
  <div class="card calendar-card" id="cal-section">
    <div class="cal-nav-row">
      <div class="card-title" style="margin:0"><span class="icon">◫</span> CALENDAR</div>
      <div class="cal-nav">
        <button class="btn-icon" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month-label" id="calMonthLabel">—</div>
        <button class="btn-icon" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-events-list" id="calEventsList"></div>
  </div>

  <!-- ── TO-DO (from Reminders) ── -->
  <div class="card todo-card" id="todo-section">
    <div class="todo-header">
      <div class="card-title" style="margin:0"><span class="icon">◧</span> TO-DO</div>
      <div class="filter-group">
        <button class="fbtn active" onclick="setFilter('all',this)">ALL</button>
        <button class="fbtn" onclick="setFilter('high',this)">HIGH</button>
        <button class="fbtn" onclick="setFilter('mid',this)">MID</button>
        <button class="fbtn" onclick="setFilter('low',this)">LOW</button>
        <button class="fbtn" onclick="setFilter('done',this)">DONE</button>
      </div>
      <span class="src-badge">FROM REMINDERS</span>
    </div>
    <div class="todo-list" id="todoList"></div>
  </div>

  <!-- ── SPENDING (manual) ── -->
  <div class="card spending-card" id="spend-section">
    <div class="spend-header">
      <div class="card-title" style="margin:0"><span class="icon">◩</span> SPENDING</div>
      <div class="spend-month-nav">
        <button class="btn-icon" onclick="changeSpendMonth(-1)">‹</button>
        <span class="spend-month-lbl" id="spendMonthLbl">—</span>
        <button class="btn-icon" onclick="changeSpendMonth(1)">›</button>
      </div>
      <div class="spend-total" id="spendTotal">$0</div>
    </div>
    <div class="spend-cats" id="spendCats"></div>
    <div class="spend-add-form">
      <select id="spendCat" style="flex:1;min-width:90px">
        <option value="Food">FOOD</option>
        <option value="Transport">TRANSPORT</option>
        <option value="Shopping">SHOPPING</option>
        <option value="Bills">BILLS</option>
        <option value="Health">HEALTH</option>
        <option value="Fun">FUN</option>
      </select>
      <input type="number" id="spendAmt" placeholder="Amount" style="flex:1;min-width:75px" min="0" step="0.01" />
      <input type="text"   id="spendNote" placeholder="Note" style="flex:1;min-width:75px" />
      <button class="btn" onclick="addSpend()">LOG</button>
    </div>
    <div class="spend-log" id="spendLog"></div>
  </div>

  <!-- ── SUBSCRIPTIONS (from Gmail) ── -->
  <div class="card subs-card" id="subs-section">
    <div class="card-title">
      <span class="icon">◪</span> SUBSCRIPTIONS
      <span class="src-badge">FROM GMAIL</span>
    </div>
    <div class="subs-list" id="subsList"></div>
  </div>

  <!-- ── WHATSAPP COMMANDS ── -->
  <div class="card wa-card" id="wa-section">
    <div class="card-title"><span class="icon">◮</span> WHATSAPP · HEX BOT COMMANDS</div>
    <div class="cmd-grid" id="cmdGrid"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════
// CONFIG
// data.json is fetched from the public raw GitHub URL — no token needed
// ════════════════════════════════════════════════════════════════
const RAW_URL  = 'https://raw.githubusercontent.com/Shinnthantsteven/hex-os/main/data.json';
const POLL_MS  = 30_000;   // 30-second polling

const CATS      = ['Food','Transport','Shopping','Bills','Health','Fun'];
const CAT_COLOR = { Food:'#00ffcc', Transport:'#00d4aa', Shopping:'#ffb830',
                    Bills:'#ff4d6d', Health:'#a78bfa', Fun:'#38bdf8' };
const PRI_COLOR = { high:'#ff4d6d', mid:'#ffb830', low:'#00ffcc' };

// ── For spending writes we still use the GitHub API with a token ──
// Token is only needed if you want to log spending from the browser.
// hex-sync.py handles all other writes automatically.
const GH_OWNER = 'Shinnthantsteven';
const GH_REPO  = 'hex-os';
const GH_FILE  = 'data.json';
const API_URL  = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;

// ════════════════════════════════════════════════════════════════
// RUNTIME STATE
// ════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);

let state = { todos:[], events:{}, spend:{}, subs:[], updated:'', sync_info:{} };
let fileSha    = null;
let spendDate  = new Date();
let calDate    = new Date();
let todoFilter = 'all';
let lastDataTs = '';

// ════════════════════════════════════════════════════════════════
// SYNC STATUS
// ════════════════════════════════════════════════════════════════
function setSync(status, detail='') {
  const dot = $('syncDot');
  const lbl = $('syncLabel');
  const ls  = $('lastSync');

  if (status === 'ok') {
    dot.className = 'sync-dot ok';
    lbl.textContent = 'LIVE';
    lbl.className   = 'ok';
    if (detail) ls.textContent = detail;
  } else if (status === 'polling') {
    dot.className = 'sync-dot ok pulse';
    lbl.textContent = 'POLLING…';
    lbl.className   = 'ok';
  } else {
    dot.className = 'sync-dot err';
    lbl.textContent = 'OFFLINE';
    lbl.className   = 'err';
    if (detail) ls.textContent = detail;
  }
}

// ════════════════════════════════════════════════════════════════
// FETCH DATA (raw GitHub URL — no auth needed for public repos)
// ════════════════════════════════════════════════════════════════
async function fetchData() {
  setSync('polling');
  try {
    const r = await fetch(RAW_URL + '?t=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const raw = await r.json();

    const remoteTs = raw.updated || '';
    if (remoteTs && remoteTs === lastDataTs) {
      // No change
      setSync('ok', lastSyncLine(raw));
      return;
    }

    lastDataTs = remoteTs;
    state = normalise(raw);
    lsSave();
    renderAll();
    setSync('ok', lastSyncLine(raw));

  } catch (e) {
    // Fall back to localStorage
    const cached = localStorage.getItem('hexState');
    if (cached) {
      try { state = normalise(JSON.parse(cached)); renderAll(); } catch(_) {}
    }
    setSync('err', 'Last fetch failed');
  }
}

function lastSyncLine(raw) {
  const si = raw.sync_info || {};
  if (si.synced_at) {
    const ago = Math.round((Date.now() - new Date(si.synced_at)) / 60000);
    const agoStr = ago < 1 ? 'just now' : ago < 60 ? `${ago}m ago` : `${Math.round(ago/60)}h ago`;
    return `hex-sync ran ${agoStr} · ${si.reminders||0} todos · ${si.events||0} events · ${si.subs||0} subs`;
  }
  if (raw.updated) {
    return `updated ${new Date(raw.updated).toLocaleTimeString()}`;
  }
  return '';
}

function normalise(raw) {
  let spend = raw.spend || {};
  if (CATS.some(c => typeof spend[c] === 'number')) {
    const mk = monthKey(new Date());
    const prev = spend;
    spend = { [mk]: { entries:[] } };
    CATS.forEach(c => { spend[mk][c] = prev[c] || 0; });
  }
  return {
    todos:     Array.isArray(raw.todos)  ? raw.todos : [],
    events:    (raw.events && !Array.isArray(raw.events)) ? raw.events : {},
    subs:      Array.isArray(raw.subs)   ? raw.subs  : [],
    spend,
    updated:   raw.updated   || '',
    sync_info: raw.sync_info || {},
  };
}

function lsSave() {
  try { localStorage.setItem('hexState', JSON.stringify(state)); } catch(_) {}
}

// ════════════════════════════════════════════════════════════════
// CLOCK
// ════════════════════════════════════════════════════════════════
function tickClock() {
  const n = new Date();
  $('clock').textContent = n.toTimeString().slice(0,8);
  $('dateStr').textContent = n.toLocaleDateString('en-US', {weekday:'short',year:'numeric',month:'short',day:'numeric'});
}
setInterval(tickClock, 1000);
tickClock();

// ════════════════════════════════════════════════════════════════
// YEAR PROGRESS
// ════════════════════════════════════════════════════════════════
function updateYear() {
  const n     = new Date();
  const start = new Date(n.getFullYear(), 0, 1);
  const end   = new Date(n.getFullYear() + 1, 0, 1);
  const pct   = ((n - start) / (end - start) * 100).toFixed(2);
  const el    = Math.floor((n - start) / 86400000);
  const tot   = Math.floor((end - start) / 86400000);

  $('yearPct').textContent    = pct + '%';
  $('yearBar').style.width    = pct + '%';
  $('daysElapsed').textContent = el;
  $('daysLeft').textContent   = tot - el;
  $('weekNum').textContent    = Math.ceil((el + 1) / 7);
  $('quarter').textContent    = 'Q' + Math.ceil((n.getMonth() + 1) / 3);
}
updateYear();

// ── UPCOMING STRIP (next 7 days from events) ──
function renderUpcoming() {
  const strip = $('upcomingStrip');
  const today = new Date(); today.setHours(0,0,0,0);
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d    = new Date(today.getTime() + i * 86400000);
    const key  = isoDate(d);
    const isT  = i === 0;
    const lbl  = isT ? 'TODAY' : d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}).toUpperCase();
    const evts = state.events[key] || [];
    const evHtml = evts.length
      ? evts.slice(0,3).map(e => `<div class="ud-event"><span class="ud-time">${e.time||'·'}</span>${esc(e.name)}</div>`).join('')
      : `<div class="ud-none">free</div>`;
    html += `<div class="upcoming-day${isT?' today':''}"><div class="ud-label">${lbl}</div><div class="ud-events">${evHtml}</div></div>`;
  }
  strip.innerHTML = html;
}

// ════════════════════════════════════════════════════════════════
// CALENDAR
// ════════════════════════════════════════════════════════════════
function changeMonth(dir) {
  calDate = new Date(calDate.getFullYear(), calDate.getMonth() + dir, 1);
  renderCal();
}

function renderCal() {
  const yr  = calDate.getFullYear();
  const mo  = calDate.getMonth();
  const tod = new Date();

  $('calMonthLabel').textContent = calDate.toLocaleDateString('en-US', {month:'long', year:'numeric'}).toUpperCase();

  const first = new Date(yr, mo, 1).getDay();
  const dim   = new Date(yr, mo + 1, 0).getDate();
  const dprev = new Date(yr, mo, 0).getDate();

  const LBLS = ['SU','MO','TU','WE','TH','FR','SA'];
  let html = LBLS.map(l => `<div class="cal-day-lbl">${l}</div>`).join('');

  for (let i = first - 1; i >= 0; i--)
    html += `<div class="cal-day other-mo">${dprev - i}</div>`;

  for (let d = 1; d <= dim; d++) {
    const key   = `${yr}-${pad(mo+1)}-${pad(d)}`;
    const isT   = d === tod.getDate() && mo === tod.getMonth() && yr === tod.getFullYear();
    const hasEv = Array.isArray(state.events[key]) && state.events[key].length > 0;
    html += `<div class="cal-day${isT?' today':''}${hasEv?' has-ev':''}">${d}</div>`;
  }

  const rem = (first + dim) % 7;
  for (let d = 1; d <= (rem === 0 ? 0 : 7 - rem); d++)
    html += `<div class="cal-day other-mo">${d}</div>`;

  $('calGrid').innerHTML = html;
  renderEventsForMonth(mo, yr);
}

function renderEventsForMonth(mo, yr) {
  const list = [];
  Object.entries(state.events).forEach(([key, evts]) => {
    const d = new Date(key + 'T00:00:00');
    if (d.getMonth() === mo && d.getFullYear() === yr) {
      (evts || []).forEach(e => list.push({...e, dateKey: key}));
    }
  });
  list.sort((a,b) => a.dateKey.localeCompare(b.dateKey));

  $('calEventsList').innerHTML = list.length
    ? list.map(e => `
        <div class="cal-ev-item">
          <div class="cal-ev-date">${fmtDate(e.dateKey)}</div>
          <div class="cal-ev-time">${esc(e.time||'·')}</div>
          <div class="cal-ev-name">${esc(e.name)}</div>
          <div class="cal-ev-cal">${esc(e.calendar||'')}</div>
        </div>`).join('')
    : '<div class="empty">No events this month</div>';
}

// ════════════════════════════════════════════════════════════════
// TO-DO  (read-only — data comes from Reminders via hex-sync.py)
// ════════════════════════════════════════════════════════════════
function setFilter(f, btn) {
  todoFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTodos();
}

function renderTodos() {
  const all = state.todos || [];
  let vis = all;
  if (todoFilter === 'done')       vis = all.filter(t => t.done);
  else if (todoFilter !== 'all')   vis = all.filter(t => t.priority === todoFilter && !t.done);

  $('todoList').innerHTML = vis.length
    ? vis.map(t => `
        <div class="todo-item${t.done ? ' done':''}">
          <div class="todo-dot" style="background:${PRI_COLOR[t.priority]||'var(--dim)'}"></div>
          <div class="todo-txt">${esc(t.text)}</div>
          <div class="pri-badge ${t.priority||'mid'}">${(t.priority||'mid').toUpperCase()}</div>
          ${t.list ? `<div class="todo-list-badge">${esc(t.list)}</div>` : ''}
        </div>`).join('')
    : `<div class="empty">${todoFilter==='all'?'No reminders synced yet — run hex-sync.py':'Nothing here'}</div>`;
}

// ════════════════════════════════════════════════════════════════
// SPENDING  (manual — local + GitHub write)
// ════════════════════════════════════════════════════════════════
function monthKey(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
}

function changeSpendMonth(dir) {
  spendDate = new Date(spendDate.getFullYear(), spendDate.getMonth() + dir, 1);
  renderSpending();
}

function getMonthData() {
  const k = monthKey(spendDate);
  if (!state.spend[k]) {
    state.spend[k] = { entries:[] };
    CATS.forEach(c => { state.spend[k][c] = 0; });
  }
  return state.spend[k];
}

function renderSpending() {
  const md  = getMonthData();
  const ent = md.entries || [];

  $('spendMonthLbl').textContent = spendDate.toLocaleDateString('en-US', {month:'long',year:'numeric'}).toUpperCase();

  const totals = {};
  CATS.forEach(c => { totals[c] = md[c] || 0; });
  const grand = Object.values(totals).reduce((a,b) => a+b, 0);
  $('spendTotal').textContent = '$' + grand.toFixed(2);

  const mx = Math.max(...Object.values(totals), 1);
  $('spendCats').innerHTML = CATS.map(c => `
    <div class="spend-row">
      <div class="spend-lbl-row">
        <span class="spend-cat-name">${c.toUpperCase()}</span>
        <span class="spend-cat-amt">$${(totals[c]||0).toFixed(2)}</span>
      </div>
      <div class="bar-track-sm">
        <div class="bar-fill-sm" style="width:${(totals[c]||0)/mx*100}%;background:${CAT_COLOR[c]};box-shadow:0 0 6px ${CAT_COLOR[c]}55"></div>
      </div>
    </div>`).join('');

  $('spendLog').innerHTML = [...ent].reverse().slice(0,20).map(e => `
    <div class="spend-entry">
      <span style="color:${CAT_COLOR[e.cat]};min-width:70px">${e.cat.toUpperCase()}</span>
      <span style="flex:1;color:var(--dim)">${esc(e.note||'')}</span>
      <span>$${e.amount.toFixed(2)}</span>
      <button class="del-btn" onclick="delSpend('${e.id}')">✕</button>
    </div>`).join('') || '<div class="empty" style="padding:12px">No entries this month</div>';
}

function addSpend() {
  const cat    = $('spendCat').value;
  const amount = parseFloat($('spendAmt').value);
  const note   = $('spendNote').value.trim();
  if (!amount || amount <= 0) { toast('ENTER VALID AMOUNT'); return; }
  const md = getMonthData();
  const id = uid();
  md.entries.push({ id, cat, amount, note });
  md[cat] = (md[cat] || 0) + amount;
  $('spendAmt').value = '';
  $('spendNote').value = '';
  renderSpending();
  lsSave();
  schedSpendSave();
  toast('SPEND LOGGED');
}

function delSpend(id) {
  const md = getMonthData();
  const e  = (md.entries||[]).find(x => x.id === id);
  if (e) {
    md.entries = md.entries.filter(x => x.id !== id);
    md[e.cat] = Math.max(0, (md[e.cat]||0) - e.amount);
  }
  renderSpending();
  lsSave();
  schedSpendSave();
  toast('ENTRY REMOVED');
}

let spendSaveTimer = null;

function schedSpendSave() {
  clearTimeout(spendSaveTimer);
  spendSaveTimer = setTimeout(saveSpendToGitHub, 1000);
}

async function saveSpendToGitHub() {
  const token = localStorage.getItem('hex_github_token') || '';
  if (!token) return; // spend saves only if token is present
  try {
    const headers = {
      Authorization: `Bearer ${token}`,
      Accept: 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
    };
    // Get current sha
    const gr = await fetch(API_URL + '?t=' + Date.now(), { headers });
    if (!gr.ok) return;
    const gj = await gr.json();
    const sha = gj.sha;
    const remote = JSON.parse(new TextDecoder().decode(
      Uint8Array.from(atob(gj.content.replace(/\s/g,'')), c => c.charCodeAt(0))
    ));
    // Merge spend only
    remote.spend = state.spend;
    remote.updated = new Date().toISOString();
    const bytes = new TextEncoder().encode(JSON.stringify(remote, null, 2));
    let bin = ''; for (const b of bytes) bin += String.fromCharCode(b);
    await fetch(API_URL, {
      method: 'PUT', headers,
      body: JSON.stringify({ message:'dashboard: spending update', content: btoa(bin), sha }),
    });
  } catch(_) {}
}

// ════════════════════════════════════════════════════════════════
// SUBSCRIPTIONS  (read-only — from Gmail via hex-sync.py)
// ════════════════════════════════════════════════════════════════
function daysUntil(ds) {
  const n = new Date(); n.setHours(0,0,0,0);
  const t = new Date(ds + 'T00:00:00');
  let d = Math.ceil((t - n) / 86400000);
  if (d < 0) d = Math.ceil(((d % 30) + 30));
  return d;
}

function dayCls(d) { return d <= 3 ? 'red' : d <= 7 ? 'amber' : 'green'; }

function renderSubs() {
  const subs = [...(state.subs||[])].sort((a,b) => daysUntil(a.renewal||'9999') - daysUntil(b.renewal||'9999'));

  $('subsList').innerHTML = subs.length
    ? subs.map(s => {
        const d   = s.renewal ? daysUntil(s.renewal) : null;
        const cls = d !== null ? dayCls(d) : 'green';
        const cost = s.cost ? `$${parseFloat(s.cost).toFixed(2)}/mo` : '';
        return `
          <div class="sub-item">
            <div class="sub-left">
              <div class="sub-name">${esc(s.name)}</div>
              <div class="sub-meta">RENEWS ${s.renewal ? fmtDate(s.renewal) : '?'}</div>
            </div>
            <div class="sub-right">
              ${d !== null ? `<div><div class="sub-days ${cls}">${d}</div><div class="sub-days-lbl">DAYS<br>LEFT</div></div>` : ''}
              ${cost ? `<div class="sub-cost">${cost}</div>` : ''}
            </div>
          </div>`;
      }).join('')
    : '<div class="empty">No subscriptions found — run check-subscriptions.py or hex-sync.py</div>';
}

// ════════════════════════════════════════════════════════════════
// WHATSAPP COMMANDS
// ════════════════════════════════════════════════════════════════
const COMMANDS = [
  { cmd:'!help',                       desc:'Show all Hex bot commands' },
  { cmd:'!status',                     desc:'Bot & system status' },
  { cmd:'!remind me [msg] in [time]',  desc:'Set a reminder' },
  { cmd:'!note [text]',                desc:'Save a quick note' },
  { cmd:'!notes',                      desc:'List saved notes' },
  { cmd:'!todo [task]',                desc:'Add to iPhone Reminders' },
  { cmd:'!todos',                      desc:'List your Reminders' },
  { cmd:'!done [#]',                   desc:'Complete a reminder by number' },
  { cmd:'!spend [amount] [cat]',       desc:'Log spend (e.g. !spend 50 Food)' },
  { cmd:'!budget',                     desc:'Monthly spend summary' },
  { cmd:'!subs',                       desc:'Subscriptions & renewal dates' },
  { cmd:'!events',                     desc:'Calendar events next 7 days' },
  { cmd:'!weather [city]',             desc:'Get weather' },
  { cmd:'!calc [expression]',          desc:'Calculator' },
  { cmd:'!translate [text]',           desc:'Translate to English' },
  { cmd:'!summarize [url]',            desc:'Summarize a webpage' },
  { cmd:'!gpt [prompt]',               desc:'Ask GPT via Hex bot' },
  { cmd:'!ping',                       desc:'Check bot is online' },
];

function renderCommands() {
  $('cmdGrid').innerHTML = COMMANDS.map(c => `
    <div class="cmd-item" onclick="copyCmd(this,${JSON.stringify(c.cmd)})">
      <div class="cmd-command">${esc(c.cmd)}</div>
      <div class="cmd-desc">${esc(c.desc)}</div>
    </div>`).join('');
}

function copyCmd(el, cmd) {
  navigator.clipboard.writeText(cmd)
    .then(() => { el.classList.add('copied'); setTimeout(() => el.classList.remove('copied'), 1100); toast('COPIED'); })
    .catch(() => toast('COPY FAILED'));
}

// ════════════════════════════════════════════════════════════════
// RENDER ALL
// ════════════════════════════════════════════════════════════════
function renderAll() {
  renderUpcoming();
  renderCal();
  renderTodos();
  renderSpending();
  renderSubs();
}

// ════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function pad(n) { return String(n).padStart(2,'0'); }

function isoDate(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function fmtDate(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2000);
}

function scrollTo(id) { $(id).scrollIntoView({ behavior:'smooth', block:'start' }); }

// ════════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════════

// Load from localStorage immediately so the page doesn't feel empty
const cached = localStorage.getItem('hexState');
if (cached) { try { state = normalise(JSON.parse(cached)); renderAll(); } catch(_) {} }

renderCommands();
updateYear();
renderCal();

// Start polling
fetchData();
setInterval(fetchData, POLL_MS);
</script>
</body>
</html>
